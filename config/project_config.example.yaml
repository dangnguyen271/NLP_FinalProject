project:
  title: "NewsDigest: News Collection and Automatic Summarisation"
  task: "text_summarization"
  domain: "digital news media"
  application_area: "automatic single-document summarisation of English news articles"
  github_repo_url: "https://github.com/thaibahung/NLP-Project"
  random_seed: 42

proposal:
  motivation: >-
    Digital news volume makes manual scanning infeasible; readers spend
    significant time finding the most relevant information.
  problem_statement: >-
    Given a single English news article, produce a short summary that is
    concise, readable, and faithful to the source.
  expected_product: >-
    A prototype that accepts an article or news URL and returns a generated
    summary, with a comparison of methods and an evaluation of quality.
  process_improvement: >-
    It reduces the time required to read full-length articles.
  research_questions:
    - "RQ1: How effectively can an NLP system summarise newspaper articles concisely and informatively?"
    - "RQ2: Does BART outperform extractive baselines (Lead-3, TextRank) in ROUGE on CNN/DailyMail and XSum?"
    - "RQ3: Which article characteristics drive summary-quality differences between methods?"

data:
  path: "data/news_sample.csv"
  text_column: "article"
  summary_column: "highlights"
  id_column: "id"
  source_column: "source"
  source: >-
    Bundled sample of 24 article-highlight pairs for offline tests; full
    CNN/DailyMail and XSum are fetched via scripts/fetch_datasets.py.
  provenance: >-
    Bundled rows are author-written; full datasets come from the HF hub.
  domain: "English digital news articles"
  challenges:
    - "Long articles exceed BART's 1024-token cap."
    - "Webpage noise (HTML, ads) must be removed before summarisation."
    - "Near-duplicate articles bias ROUGE if not deduplicated."
    - "Article length varies widely across outlets."

model:
  baseline: "lead_3"
  extractive: "textrank"
  # distilbart is ~half the size of bart-large-cnn but is the official distilled
  # checkpoint trained on the same CNN/DailyMail data — same quality on news.
  abstractive: "sshleifer/distilbart-cnn-12-6"
  max_input_tokens: 1024
  min_summary_tokens: 30
  max_summary_tokens: 90
  num_sentences_extractive: 3
  artifact_dir: "artifacts"
  use_abstractive: true

evaluation:
  rouge_variants: ["rouge1", "rouge2", "rougeL", "rougeLsum"]
  max_examples: 50

scrape:
  user_agent: "NewsDigest/0.1 (academic project; contact: 22hieu.nh@vinuni.edu.vn)"
  request_timeout_seconds: 15

reports:
  directory: "reports"

